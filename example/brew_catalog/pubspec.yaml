name: brew_catalog
description: A desktop app for browsing, searching, and managing Homebrew packages.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.7.0

dependencies:
  brew_dart:
    path: ../..
  collection: ^1.18.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.0
  go_router: ^14.0.0
  riverpod_annotation: ^2.6.0
  url_launcher: ^6.3.0

dev_dependencies:
  build_runner: ^2.4.0
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.6.0

flutter:
  uses-material-design: true
