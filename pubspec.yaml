name: brew_dart
description: >-
  A Dart package providing full programmatic access to Homebrew on macOS/Linux.
  Wraps the brew CLI with strongly-typed models, JSON v2 parsing, and
  stream-based output for long-running commands.
version: 0.1.0
repository: https://github.com/anthropics/brew_dart

environment:
  sdk: ^3.7.0

dependencies:
  async: ^2.12.0
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  meta: ^1.16.0

dev_dependencies:
  build_runner: ^2.4.0
  freezed: ^3.0.0
  json_serializable: ^6.9.0
  lints: ^5.1.0
  test: ^1.25.0
