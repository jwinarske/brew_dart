name: brew_dart
description: >-
  Programmatic access to Homebrew on macOS and Linux. Strongly-typed freezed
  models, JSON v2 parsing, streaming output, batch operations, and a Brew facade.
version: 0.3.0
homepage: https://github.com/jwinarske/brew_dart
repository: https://github.com/jwinarske/brew_dart
issue_tracker: https://github.com/jwinarske/brew_dart/issues

topics:
  - homebrew
  - cli
  - package-manager
  - macos
  - linux

platforms:
  macos:
  linux:

environment:
  sdk: ^3.10.1

dependencies:
  async: ^2.12.0
  freezed_annotation: ^3.0.0
  json_annotation: ^4.11.0
  meta: ^1.16.0

dev_dependencies:
  build_runner: ^2.4.0
  freezed: ^3.0.0
  json_serializable: ^6.9.0
  lints: ^6.1.0
  test: ^1.25.0
